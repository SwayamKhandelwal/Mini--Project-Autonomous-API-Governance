<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project 42 Dashboard</title>

  <!-- React CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    .header {
      padding: 15px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
    }

    .btn {
      padding: 8px 15px;
      background: #22c55e;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .stat {
      font-size: 28px;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
    }

    svg {
      width: 100%;
      height: 300px;
    }

    .node {
      fill: #22c55e;
    }

    .link {
      stroke: #94a3b8;
      stroke-width: 2;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const API = "http://localhost:3000";

function App() {
  const [data, setData] = React.useState(null);

  const fetchData = async () => {
    const res = await fetch(API + "/analyze");
    const result = await res.json();

    const graphNodes = Object.keys(result.graph).map((key, i) => ({
      id: key,
      x: 150 + i * 200,
      y: 150
    }));

    const graphEdges = Object.keys(result.graph).flatMap(key =>
      result.graph[key].map(dep => ({
        source: key,
        target: dep
      }))
    );

    setData({
      ...result,
      graphNodes,
      graphEdges
    });
  };

  React.useEffect(() => {
    fetchData();
  }, []);

  if (!data) return <div className="container">Loading...</div>;

  return (
    <div>

      <div className="header">
        <h2>🚀 Project 42 Dashboard</h2>
        <button className="btn" onClick={fetchData}>Refresh</button>
      </div>

      <div className="container">

        {/* Stats */}
        <div className="grid">
          <div className="card">
            <div>Services</div>
            <div className="stat">{data.apis.length}</div>
          </div>

          <div className="card">
            <div>Dependencies</div>
            <div className="stat">{Object.keys(data.graph).length}</div>
          </div>

          <div className="card">
            <div>Issues</div>
            <div className="stat">{data.performance.length}</div>
          </div>
        </div>

        {/* Graph */}
        <div className="card">
          <h3>🔗 Dependency Graph</h3>
          <svg>
            {data.graphEdges.map((e, i) => {
              const from = data.graphNodes.find(n => n.id === e.source);
              const to = data.graphNodes.find(n => n.id === e.target);

              return (
                <line
                  key={i}
                  x1={from.x}
                  y1={from.y}
                  x2={to.x}
                  y2={to.y}
                  className="link"
                />
              );
            })}

            {data.graphNodes.map((n, i) => (
              <g key={i}>
                <circle cx={n.x} cy={n.y} r="40" className="node"/>
                <text x={n.x} y={n.y} fill="white" textAnchor="middle" dy="5">
                  {n.id}
                </text>
              </g>
            ))}
          </svg>
        </div>

        {/* APIs */}
        <div className="card">
          <h3>📡 APIs</h3>
          <pre>{JSON.stringify(data.apis, null, 2)}</pre>
        </div>

        {/* Performance */}
        <div className="card">
          <h3>⚡ Performance Issues</h3>
          <pre>{data.performance.join("\n") || "No issues"}</pre>
        </div>

        {/* AI */}
        <div className="card">
          <h3>🤖 AI Insights</h3>
          <pre>{data.aiInsights}</pre>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
