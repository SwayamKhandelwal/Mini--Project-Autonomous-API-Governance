version: '3.8'

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/your_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

  # ─── Project42 Services ──────────────────────────────────────────────────

  gateway:
    build: .
    command: node gateway/index.js
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - kafka
      - neo4j
    restart: unless-stopped

  agent-discovery:
    build: .
    command: node agents/discovery/index.js
    env_file: .env
    depends_on:
      - kafka
      - neo4j
      - gateway
    restart: unless-stopped

  agent-dependency:
    build: .
    command: node agents/dependency/index.js
    env_file: .env
    depends_on:
      - kafka
      - neo4j
    restart: unless-stopped

  agent-security:
    build: .
    command: node agents/security/index.js
    env_file: .env
    depends_on:
      - kafka
      - neo4j
    restart: unless-stopped

  agent-performance:
    build: .
    command: node agents/performance/index.js
    env_file: .env
    depends_on:
      - kafka
      - neo4j
    restart: unless-stopped

  agent-refactoring:
    build: .
    command: node agents/refactoring/index.js
    env_file: .env
    depends_on:
      - kafka
      - neo4j
    restart: unless-stopped

volumes:
  neo4j_data:
  grafana_data:
